<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h1>Expense Tracker</h1>

  <h3>Balance: ₹<span id="bal">0</span></h3>
  <p>Income: ₹<span id="inc">0</span> | Expense: ₹<span id="exp">0</span></p>

  <input type="text" id="text" placeholder="Description">
  <input type="number" id="amt" placeholder="Amount">
  <button onclick="add()">Add</button>

  <ul id="list"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
